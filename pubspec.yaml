name: markup_mobile
description: Mark-Up — Platform Pembelajaran & Mentoring
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  http: ^1.6.0

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.4.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Google Fonts
  google_fonts: ^6.1.0

  # Icons
  cupertino_icons: ^1.0.8

  # Open external URL (link pendaftaran lomba, dll)
  url_launcher: ^6.2.5

  # Pilih gambar bukti pembayaran (galeri/kamera, cross-platform termasuk web)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Generate ikon launcher (Android + iOS) dari satu sumber gambar.
  # Jalankan: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# Konfigurasi ikon launcher Mark-Up (simbol M, latar putih).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  # Adaptive icon Android 8+: latar putih + foreground transparan (zona aman).
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  # iOS tidak mendukung transparansi — ratakan ke latar putih.
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/markup.png
    - assets/images/google.png
    - assets/images/qris.png
